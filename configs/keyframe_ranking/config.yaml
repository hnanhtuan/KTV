defaults:
  - _self_
  - experiment: null

json_path: ???
video_path: ???
video_frame_tensor_path: ???
save_cluster_path: ???
combined_output_path: null
dataset: NExTQA
device: cpu

# Temporal-chain keyframe selection defaults.
num_keyframes: 12
enable_query_aware_ranking: true
lambda_event: 0.5
alpha_gap: 0.6
beta_redundancy: 0.8
first_frame_strategy: cluster_event
seed_pool_size: 16
seed_bins: 6
score_normalizer: minmax
max_frames_to_extract: 5400

# CLIP Stage 2 precompute defaults. Image features are written to a
# temporary directory and deleted when the run finishes unless this is set.
clip_image_batch_size: 128
clip_text_batch_size: 128
temp_feature_dir: null

mlflow:
  enabled: true
  tracking_uri: null
  experiment_name: ktv
  run_name: null
  nested: true
  tags: {}

hydra:
  job:
    chdir: false
